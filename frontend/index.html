<!DOCTYPE html>
<html lang="en" class="scroll-smooth" itemscope itemtype="https://schema.org/WebApplication">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>NFT Marketplace | Discover & Trade Digital Assets</title>
    <meta

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://nftmarketplace.com" />
    <meta property="twitter:title" content="NFT Marketplace | Discover & Trade Digital Assets" />
    <meta property="twitter:description" content="Explore curated NFT collections, featured tokens, and trending digital assets." />
    <meta property="twitter:image" content="https://nftmarketplace.com/twitter-image.jpg" />

    <!-- Web Application Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "NFT Marketplace",
      "description": "A decentralized marketplace for discovering, collecting, and trading NFTs",
      "url": "https://nftmarketplace.com",

      "offers": {
        "@type": "AggregateOffer",
        "priceCurrency": "ETH",
        "offerCount": "10000+"
      }
    }
    </script>
  
  <body>

      NFT marketplace, buy NFTs, sell NFTs, NFT trading, digital collectibles,
